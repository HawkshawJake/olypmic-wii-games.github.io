<!DOCTYPE html>
<html>
<head>
    <title>Wii Sports Menu | Wii Olympics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body {
            font-family: ui-monospace, SFMono-Regular, Consolas, 'Courier New', monospace;
            background: linear-gradient(180deg, #dbf0ff 0%, #bce0ff 40%, #7ac7ff 100%);
        }
        .pixel-box {
            background: linear-gradient(180deg, #f8fdff 0%, #d7f2ff 100%);
            border: 4px solid #3b5d8a;
            box-shadow: inset 0 0 0 4px rgba(255,255,255,0.75);
        }
        .pixel-button {
            border: 4px solid #3b5d8a;
            background: #e3f2ff;
            box-shadow: inset 0 -6px 0 0 rgba(0,0,0,0.08);
        }
        .pixel-button:hover {
            background: #cfe8ff;
        }
        .pixel-header {
            background: rgba(255,255,255,0.92);
            border: 4px solid #3b5d8a;
            box-shadow: 0 12px 0 0 rgba(0,0,0,0.05);
        }
        .pixel-label {
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #3f5c7a;
        }
        .pixel-title {
            font-size: 3rem;
            letter-spacing: -0.05em;
        }
        .pixel-panel {
            background: rgba(255,255,255,0.9);
            border: 4px solid #3b5d8a;
        }
        .pixel-pill {
            background: #dbeeff;
            border: 4px solid #3b5d8a;
            padding: 0.75rem 1.25rem;
        }
    </style>
</head>
<body class="min-h-screen text-slate-900">
<main class="relative min-h-screen overflow-hidden px-4 py-8">
    <div class="mx-auto max-w-6xl">
        <header class="pixel-header mb-6 flex flex-col gap-4 p-5 sm:flex-row sm:items-center sm:justify-between">
            <div class="pixel-pill text-xs font-bold text-slate-700">Main Menu</div>
            <div class="pixel-title font-black text-slate-900">
                Wii <span class="text-sky-600">Sports</span>
            </div>
        </header>

        <div class="grid gap-6 lg:grid-cols-[1.15fr_1fr]">
            <section class="pixel-panel space-y-5 p-6 shadow-[10px_10px_0_0_rgba(59,93,138,0.18)]">
                <div class="pixel-box p-4 text-center text-sm font-bold uppercase text-slate-700">Select the number of players.</div>
                <div class="grid gap-4 sm:grid-cols-2">
                    <button class="pixel-button rounded-none px-6 py-10 text-4xl font-bold text-slate-900">1</button>
                    <button class="pixel-button rounded-none px-6 py-10 text-4xl font-bold text-slate-900">2</button>
                    <button class="pixel-button rounded-none px-6 py-10 text-4xl font-bold text-slate-900">3</button>
                    <button class="pixel-button rounded-none px-6 py-10 text-4xl font-bold text-slate-900">4</button>
                </div>

                <div class="pixel-box p-5">
                    <h2 class="text-lg font-bold text-slate-900">Tonight's fixed sequence</h2>
                    <ul class="mt-4 space-y-2 text-slate-700">
                        <li>• Wii Bowling</li>
                        <li>• Wii Tennis</li>
                        <li>• Wii Boxing</li>
                        <li>• Switch Bowling</li>
                        <li>• Switch Tennis</li>
                        <li>• Switch Chambara</li>
                        <li>• Switch Badminton</li>
                    </ul>
                </div>
            </section>

            <section class="pixel-panel p-6 shadow-[10px_10px_0_0_rgba(59,93,138,0.18)]">
                <div class="pixel-box p-5">
                    <div class="flex items-center justify-between gap-4">
                        <div>
                            <p class="pixel-label text-xs font-bold">Wii Remotes</p>
                            <h2 class="mt-2 text-3xl font-black text-slate-900">Host the event</h2>
                        </div>
                        <div class="pixel-pill text-sm font-semibold text-slate-900">LIVE</div>
                    </div>
                </div>

                <div class="pixel-box mt-6 p-6">
                    <form action="/create_game" method="POST" class="space-y-4">
                        <input name="username" required type="text" placeholder="Host name" class="w-full rounded-none border-4 border-slate-700 bg-[#eef7ff] px-4 py-4 text-slate-900 outline-none" />
                        <input name="game_name" required type="text" placeholder="Game night name" class="w-full rounded-none border-4 border-slate-700 bg-[#eef7ff] px-4 py-4 text-slate-900 outline-none" />
                        <input name="team_name" type="text" placeholder="First team name (optional)" class="w-full rounded-none border-4 border-slate-700 bg-[#eef7ff] px-4 py-4 text-slate-900 outline-none" />
                        <button class="w-full pixel-button rounded-none px-6 py-4 text-base font-bold uppercase text-slate-900">Start Game Night</button>
                    </form>
                </div>

                <div class="mt-6 grid gap-4 sm:grid-cols-2">
                    <a href="#" class="pixel-button inline-flex items-center justify-center rounded-none px-5 py-4 text-center text-sm font-bold text-slate-900">More</a>
                    <a href="#" class="pixel-button inline-flex items-center justify-center rounded-none px-5 py-4 text-center text-sm font-bold text-slate-900">Back</a>
                </div>
            </section>
        </div>
    </div>
</main>
</body>
</html>
