<!DOCTYPE html>
<html>
<head>
    <title>Wii Sports Menu | Wii Olympics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
<main class="relative min-h-screen overflow-hidden bg-gradient-to-b from-slate-100 via-sky-200 to-sky-400">
    <div class="absolute inset-x-0 top-0 h-40 bg-gradient-to-b from-slate-100 via-slate-100 to-sky-200"></div>
    <div class="relative mx-auto max-w-7xl px-4 py-8">
        <header class="mb-6 flex flex-col gap-4 rounded-3xl border border-slate-300/30 bg-white/95 p-5 shadow-xl shadow-slate-200 sm:flex-row sm:items-center sm:justify-between">
            <div class="inline-flex rounded-full border border-slate-200 bg-slate-200/70 px-4 py-2 text-xs uppercase tracking-[0.35em] text-slate-600">Main Menu</div>
            <div class="flex items-center gap-2 text-4xl font-semibold tracking-tight text-slate-900">
                <span>Wii</span><span class="text-sky-600">Sports</span>
            </div>
        </header>

        <div class="grid gap-6 lg:grid-cols-[1.15fr_1fr]">
            <section class="space-y-4 rounded-[2rem] border border-slate-300/20 bg-white/90 p-6 shadow-2xl shadow-slate-200 backdrop-blur-xl">
                <div class="rounded-[2rem] border border-slate-200 bg-slate-50 p-4 text-center text-sm uppercase tracking-[0.35em] text-slate-500">Select the number of players.</div>
                <div class="grid gap-4 sm:grid-cols-2">
                    <button class="rounded-[1.5rem] border border-slate-300 bg-slate-100 px-6 py-10 text-4xl font-semibold text-slate-900 shadow-[0_15px_40px_-30px_rgba(0,0,0,0.7)] transition hover:border-sky-500/40 hover:bg-slate-200">1</button>
                    <button class="rounded-[1.5rem] border border-slate-300 bg-slate-100 px-6 py-10 text-4xl font-semibold text-slate-900 shadow-[0_15px_40px_-30px_rgba(0,0,0,0.7)] transition hover:border-sky-500/40 hover:bg-slate-200">2</button>
                    <button class="rounded-[1.5rem] border border-slate-300 bg-slate-100 px-6 py-10 text-4xl font-semibold text-slate-900 shadow-[0_15px_40px_-30px_rgba(0,0,0,0.7)] transition hover:border-sky-500/40 hover:bg-slate-200">3</button>
                    <button class="rounded-[1.5rem] border border-slate-300 bg-slate-100 px-6 py-10 text-4xl font-semibold text-slate-900 shadow-[0_15px_40px_-30px_rgba(0,0,0,0.7)] transition hover:border-sky-500/40 hover:bg-slate-200">4</button>
                </div>

                <div class="mt-6 rounded-[1.75rem] border border-slate-200 bg-slate-50 p-5">
                    <h2 class="text-lg font-semibold text-slate-900">Tonight's fixed sequence</h2>
                    <ul class="mt-4 space-y-2 text-slate-700">
                        <li>• Wii Bowling</li>
                        <li>• Wii Tennis</li>
                        <li>• Wii Boxing</li>
                        <li>• Switch Bowling</li>
                        <li>• Switch Tennis</li>
                        <li>• Switch Chambara</li>
                        <li>• Switch Badminton</li>
                    </ul>
                </div>
            </section>

            <section class="rounded-[2rem] border border-slate-300/20 bg-gradient-to-br from-slate-50 to-sky-200/70 p-6 shadow-2xl shadow-slate-200 backdrop-blur-xl">
                <div class="rounded-[1.75rem] border border-white/60 bg-white/90 p-5 shadow-inner shadow-white/40">
                    <div class="flex items-center justify-between gap-4">
                        <div>
                            <p class="text-sm uppercase tracking-[0.35em] text-slate-500">Wii Remotes</p>
                            <h2 class="mt-2 text-3xl font-semibold text-slate-900">Host the event</h2>
                        </div>
                        <div class="rounded-full bg-sky-700 px-4 py-2 text-sm font-semibold text-white">LIVE</div>
                    </div>
                </div>

                <div class="mt-6 rounded-[1.75rem] border border-slate-300/30 bg-white/90 p-6 shadow-lg shadow-slate-200">
                    <form action="/create_game" method="POST" class="space-y-4">
                        <input name="username" required type="text" placeholder="Host name" class="w-full rounded-[1.5rem] border border-slate-300 bg-slate-100 px-4 py-4 text-slate-900 outline-none focus:border-sky-500" />
                        <input name="game_name" required type="text" placeholder="Game night name" class="w-full rounded-[1.5rem] border border-slate-300 bg-slate-100 px-4 py-4 text-slate-900 outline-none focus:border-sky-500" />
                        <input name="team_name" type="text" placeholder="First team name (optional)" class="w-full rounded-[1.5rem] border border-slate-300 bg-slate-100 px-4 py-4 text-slate-900 outline-none focus:border-sky-500" />
                        <button class="w-full rounded-[1.5rem] bg-sky-600 px-6 py-4 text-base font-semibold uppercase tracking-[0.12em] text-white transition hover:bg-sky-500">Start Game Night</button>
                    </form>
                </div>

                <div class="mt-6 grid gap-4 sm:grid-cols-2">
                    <a href="#" class="rounded-[1.5rem] border border-slate-300 bg-slate-100 px-5 py-4 text-center text-sm font-semibold uppercase tracking-[0.15em] text-slate-900 hover:bg-slate-200">More</a>
                    <a href="#" class="rounded-[1.5rem] border border-slate-300 bg-slate-100 px-5 py-4 text-center text-sm font-semibold uppercase tracking-[0.15em] text-slate-900 hover:bg-slate-200">Back</a>
                </div>
            </section>
        </div>
    </div>
</main>
</body>
</html>
