<!DOCTYPE html>
<html>
<head>
    <title>Wii Olympics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-white">
<main class="relative min-h-screen w-full">

    <div class="p-6" x-data="{ isLoginPage: true }">

        <!-- HEADER -->
        <header class="flex w-full justify-between">
            <div></div>

            <!-- toggle buttons -->
            <div>
                <button 
                    type="button" 
                    @click="isLoginPage = false" 
                    x-show="isLoginPage"
                    class="rounded-2xl border-b-2 border-b-gray-300 bg-white px-4 py-3 font-bold text-blue-500 ring-2 ring-gray-300 hover:bg-gray-200">
                    Join Game
                </button>

                <button 
                    type="button" 
                    @click="isLoginPage = true" 
                    x-show="!isLoginPage"
                    class="rounded-2xl border-b-2 border-b-gray-300 bg-white px-4 py-3 font-bold text-blue-500 ring-2 ring-gray-300 hover:bg-gray-200">
                    Create Game
                </button>
            </div>
        </header>

        <!-- CENTER CARD -->
        <div class="absolute left-1/2 top-1/2 w-full max-w-sm -translate-x-1/2 -translate-y-1/2 transform space-y-4 text-center">

            <!-- CREATE GAME -->
            <form action="/create_game" method="POST" x-show="isLoginPage" class="space-y-4">

                <h1 class="text-2xl font-bold">Start a Games Night</h1>

                <div class="w-full rounded-2xl bg-gray-50 px-4 ring-2 ring-gray-200 focus-within:ring-blue-400">
                    <input 
                        name="username"
                        required
                        type="text" 
                        placeholder="Your name" 
                        class="my-3 w-full border-none bg-transparent outline-none" />
                </div>

                <div class="w-full rounded-2xl bg-gray-50 px-4 ring-2 ring-gray-200 focus-within:ring-blue-400">
                    <input 
                        name="game_name"
                        required
                        type="text" 
                        placeholder="Game night name" 
                        class="my-3 w-full border-none bg-transparent outline-none" />
                </div>

                <div class="w-full rounded-2xl bg-gray-50 px-4 ring-2 ring-gray-200 focus-within:ring-blue-400">
                    <select name="platform" class="my-3 w-full border-none bg-transparent outline-none p-3">
                        <option value="Wii">Wii</option>
                        <option value="Switch">Switch</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <button class="w-full rounded-2xl border-b-4 border-b-blue-600 bg-blue-500 py-3 font-bold text-white hover:bg-blue-400">
                    START GAME
                </button>

            </form>

            <!-- JOIN GAME -->
            <form action="/join_game" method="POST" x-show="!isLoginPage" class="space-y-4">

                <h1 class="text-2xl font-bold">Join a Games Night</h1>

                <div class="w-full rounded-2xl bg-gray-50 px-4 ring-2 ring-gray-200 focus-within:ring-blue-400">
                    <input 
                        name="username"
                        required
                        type="text" 
                        placeholder="Username" 
                        class="my-3 w-full border-none bg-transparent outline-none" />
                </div>

                <div class="w-full rounded-2xl bg-gray-50 px-4 ring-2 ring-gray-200 focus-within:ring-blue-400">
                    <input 
                        name="game_code"
                        required
                        type="text" 
                        placeholder="Game Code" 
                        class="my-3 w-full border-none bg-transparent outline-none" />
                </div>

                <button class="w-full rounded-2xl border-b-4 border-b-blue-600 bg-blue-500 py-3 font-bold text-white hover:bg-blue-400">
                    JOIN GAME
                </button>

            </form>

            {% if games %}
            <div class="mt-8 rounded-3xl bg-white p-6 shadow-lg text-left">
                <h2 class="text-xl font-bold mb-4">Open game nights</h2>
                <div class="space-y-3 text-left">
                    {% for game in games %}
                        <a href="{{ url_for('main.game', code=game.code) }}" class="block rounded-2xl border border-gray-200 p-4 hover:bg-gray-50">
                            <div class="flex justify-between items-center">
                                <div>
                                    <p class="font-bold">{{ game.name }}</p>
                                    <p class="text-sm text-gray-500">Host: {{ game.host }} · {{ game.platform }}</p>
                                </div>
                                <div class="text-xs font-semibold text-blue-600">{{ game.code }}</div>
                            </div>
                        </a>
                    {% endfor %}
                </div>
            </div>
            {% endif %}

            <!-- FOOTER -->
            <div class="mt-8 text-sm text-gray-400">
                By signing in, you agree to not sue me as I don't have any money 
            </div>

        </div>
    </div>
</main>
</body>
</html>
